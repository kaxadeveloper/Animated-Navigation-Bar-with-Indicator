<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar with Indicator</title>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/27d4dbe998.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="navbar">
        <ul>
            <li class="active">
                <a href="#">
                   <i class="bx bx-home icon"></i>
                   <i class="fa-solid fa-house activeIcon"></i>
                </a>
            </li>
            <li>
                <a href="#">
                   <i class="bx bx-user icon"></i>
                   <i class="fa-solid fa-user activeIcon"></i>
                </a>
            </li>
            <li>
                <a href="#">
                   <i class="bx bx-heart icon"></i>
                   <i class="fa-solid fa-heart activeIcon"></i>
                </a>
            </li>
            <li>
                <a href="#">
                   <i class="bx bx-folder icon"></i>
                   <i class="fa-solid fa-folder activeIcon"></i>
                </a>
            </li>
            <li>
                <a href="#">
                   <i class="bx bx-cog icon"></i>
                   <i class="fa-solid fa-cog activeIcon"></i>
                </a>
            </li>
            <div class="indicator"></div>
        </ul>
    </div>

    <script src="app.js"></script>
</body>

</html>
